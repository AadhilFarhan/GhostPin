name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version from tag
        run: /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${GITHUB_REF_NAME#v}" Support/Info.plist

      - name: Build app bundle
        run: ./scripts/build-app.sh

      - name: Package DMG and checksum
        run: |
          mkdir staging
          cp -R dist/GhostPin.app staging/
          ln -s /Applications staging/Applications
          hdiutil create -volname "GhostPin" -srcfolder staging -ov -format UDZO dist/GhostPin.dmg
          cd dist && shasum -a 256 GhostPin.dmg > GhostPin.dmg.sha256

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/GhostPin.dmg dist/GhostPin.dmg.sha256 \
            --title "GhostPin ${GITHUB_REF_NAME#v}" --generate-notes

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "TAP_GITHUB_TOKEN not configured; skipping tap update"
            exit 0
          fi
          VERSION=${GITHUB_REF_NAME#v}
          SHA=$(awk '{print $1}' dist/GhostPin.dmg.sha256)
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/AadhilFarhan/homebrew-tap.git" tap
          cd tap
          sed -i '' -E "s|version \"[^\"]+\"|version \"${VERSION}\"|" Casks/ghostpin.rb
          sed -i '' -E "s|sha256 \"[^\"]+\"|sha256 \"${SHA}\"|" Casks/ghostpin.rb
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -am "ghostpin ${VERSION}"
          git push
